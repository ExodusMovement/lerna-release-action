name: 'Lerna release action: Version Dispatch'
description: >
  Inspect a PR's pre-squash commits, attribute each commit to workspace
  packages by touched files, and either (a) dispatch the version workflow
  with a per-package bump map when the PR is merged, or (b) post a sticky
  preview comment showing the resulting versions when the PR is still
  open. The prior preview comment is deleted on every run so reviewers
  always see exactly one preview comment, anchored at the end of the
  conversation timeline.

inputs:
  github-token:
    description: 'Token used to create a PR'
    required: true
  path:
    description: 'Working directory to run in, relative to the checkout root. Set this when the lerna workspace lives in a subdirectory of the repository. Defaults to the checkout root.'
    required: false
  ref:
    description: 'Ref to checkout'
    default: 'master'
  exclude-labels:
    description: 'Comma-separated list of PR labels that skip the dispatch entirely.'
    default: 'skip-release'
  version-workflow-id:
    description: 'Workflow file name to dispatch with the computed bumps.'
    default: 'version.yml'
  dry-run:
    description: "When 'true' the action only logs the computed bumps and does not dispatch."
    required: false
    default: 'false'
  pr-number:
    description: 'Optional PR number to inspect ad-hoc. Required for non-pull_request triggers (e.g. workflow_dispatch). When set, this PR is fetched from the REST API.'
    required: false
    default: ''

outputs:
  bumps:
    description: 'JSON-encoded map from package name to bump level, computed from the PR commits.'
  packages:
    description: 'Comma-separated list of workspace package names with a non-empty bump.'

runs:
  using: 'node20'
  main: '../dist/version-dispatch/index.js'
author: 'ExodusMovement'
branding:
  icon: 'plus-square'
  color: 'blue'
