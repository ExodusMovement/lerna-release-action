name: 'Lerna release action: Version'
description: 'Action to version selected packages'
inputs:
  github-token:
    description: 'Token used to create a PR'
    required: true
  packages:
    description: 'Selected packages as comma separated string, e.g. modules/storage-spec,libraries/formatting'
    required: true
  path:
    description: 'Working directory to run in, relative to the checkout root. Set this when the lerna workspace lives in a subdirectory of the repository. Defaults to the checkout root.'
    required: false
  version-strategy:
    description: 'Versioning strategy, supports conventional-commits and static versioning through: patch, minor, major, premajor, preminor, prepatch, prerelease. Ignored when `bumps` is provided.'
    default: 'conventional-commits'
  bumps:
    description: 'Optional JSON map of `{ "<package>": "<bump>" }` for explicit per-package versioning, e.g. `{"@exodus/multi-account-redux":"major","@exodus/balances":"patch"}`. When supplied, `version-strategy` is ignored and lerna runs once per entry with the named bump and `--scope <package>`. Every package in this map must also appear in `packages`.'
    required: false
  version-extra-args:
    description: 'Additional args appended to the lerna version call'
  assignee:
    description: 'User to assign the workflow to. When triggered through workflow_dispatch, this will default to the user who invoked the workflow.'
  auto-merge:
    description: 'Enables auto-merging on the created pull request when set to `true`. Defaults to `false`.'
    default: false
  request-reviewers:
    description: 'Request PR assignees as reviewers'
    default: true
  draft:
    description: 'Creates the release PR as draft'
    default: false
  base-branch:
    description: 'Branch to create the PR against. Defaults to the repository default branch.'
    required: false
  format-command:
    description: 'Optional command to format the generated CHANGELOG.md and package.json files before commit (e.g. "yarn prettier --write"). The touched files are appended as positional arguments. When unset, files are committed as produced by lerna/conventional-changelog, which may violate the repo formatter.'
    required: false

runs:
  using: 'node20'
  main: '../dist/version/index.js'
author: 'ExodusMovement'
branding:
  icon: 'plus-square'
  color: 'blue'
